<app-header />

<div class="container">
    <div class="row">
        <div class="col-sm-12 title-bar">
            <h1 class="title">Search Results</h1>
        </div>
    </div>
    @if (isFetching() && !error()) {
        <p class="fallback">Fetching results...</p>
    }
    @if (error()) {
        <p class="error">{{ error() }}</p>
    }
    @if (searchResult() && searchResult().length > 0) {
        <app-search-results [results]="searchResult()"></app-search-results>
    } @else {
        <app-not-found [query]="query"></app-not-found>
    }
</div>
