<app-header />
<div class="container">
    @if (isFetching() && !error()) {
        <h1>
            Gene symbol report
            <a class="clickable help" title="Help"><fa-icon [icon]="faQuestionCircle"></fa-icon></a>
        </h1>
        <p class="fallback">Fetching report...</p>
    }
    @if (error()) {
        <p>{{ error() }}</p>
    }
    @if (report()) {
        <h1>
            Gene symbol report for {{ appSymbol }}
            <a class="clickable help" title="Help"><fa-icon [icon]="faQuestionCircle"></fa-icon></a>
        </h1>
        <app-pgnc-data [result]="result" [symbol]="appSymbol"></app-pgnc-data>
        <app-xref-resources [result]="result" [symbol]="appSymbol"></app-xref-resources>
    } @else if (!report()) {
        <p>No report found</p>
    }
</div>
