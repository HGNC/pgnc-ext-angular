<header>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <button
                class="navbar-toggler"
                type="button"
                (click)="isMenuCollapsed = !isMenuCollapsed"
            >
                <fa-icon [icon]="faBars" />
            </button>
            <div
                [ngbCollapse]="isMenuCollapsed"
                class="collapse navbar-collapse"
                id="navbarContent"
            >
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Gene data</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled-link" href="#">Downloads</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact us</a>
                    </li>
                    <li ngbDropdown class="nav-item" role="presentation">
                        <button
                            type="button"
                            class="nav-link"
                            ngbDropdownToggle
                        >
                            More
                        </button>
                        <div ngbDropdownMenu>
                            <button ngbDropdownItem>Action</button>
                            <button ngbDropdownItem>Another action</button>
                            <button ngbDropdownItem>Something else here</button>
                            <div class="dropdown-divider"></div>
                            <button ngbDropdownItem>Separated link</button>
                        </div>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"
                            >Request symbol
                            <fa-icon [icon]="faEnvelope"></fa-icon
                        ></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>
